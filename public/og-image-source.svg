<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="315" r="280" fill="rgba(124,58,237,0.12)"/>
  <circle cx="1050" cy="315" r="240" fill="rgba(6,182,212,0.08)"/>
  <circle cx="600" cy="550" r="200" fill="rgba(236,72,153,0.06)"/>
  <text x="600" y="260" font-family="Space Grotesk, Inter, sans-serif" font-size="96" font-weight="700"
    text-anchor="middle" fill="url(#grad)" filter="url(#glow)">AyCode</text>
  <text x="600" y="340" font-family="Inter, sans-serif" font-size="26"
    text-anchor="middle" fill="#94a3b8">Développeur React Native · Next.js · DevOps Freelance</text>
  <text x="600" y="395" font-family="Inter, sans-serif" font-size="20"
    text-anchor="middle" fill="#64748b">Kubernetes · CI/CD · Applications mobiles & web</text>
  <rect x="480" y="430" width="240" height="2" rx="1" fill="url(#grad)" opacity="0.6"/>
</svg>
